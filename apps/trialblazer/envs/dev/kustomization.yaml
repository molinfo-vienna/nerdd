apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

components:
  - ../../../_common/nerdd-module

configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
      - image=ghcr.io/molinfo-vienna/trialblazer:latest

patches:
  - target:
      kind: Deployment
      name: trialblazer
    path: patch-deployment.yaml
