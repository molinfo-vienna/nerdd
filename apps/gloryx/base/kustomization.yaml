apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

configMapGenerator:
  - name: app-config
    literals:
      - appName=gloryx
      - modelClass=gloryx.GloryXModel
      - topic=gloryx-checkpoints
      - consumerGroup=predict-checkpoints-gloryx
      - cpuRequest=4
      - memRequest=5Gi
      - cpuLimit=6
      - memLimit=8Gi
