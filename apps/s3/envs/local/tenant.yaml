apiVersion: minio.min.io/v2
kind: Tenant
metadata:
  name: minio
spec:
  image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
  configuration:
    name: s3-config
  pools:
    - servers: 1
      volumesPerServer: 1
      volumeClaimTemplate:
        metadata:
          name: data
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
  buckets:
    - name: job-data
  requestAutoCert: false
