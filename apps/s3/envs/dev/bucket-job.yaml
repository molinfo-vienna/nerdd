apiVersion: batch/v1
kind: Job
metadata:
  name: create-job-data-bucket
spec:
  backoffLimit: 6
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-bucket
          image: quay.io/minio/mc:RELEASE.2025-03-12T17-29-24Z
          command: ["/bin/sh", "-ec"]
          args:
            - |
              mc alias set rook "$S3_ENDPOINT" "$S3_ACCESS_KEY" "$S3_SECRET_KEY" --api S3v4
              # mb = make bucket
              # --ignore-existing: if bucket already exists, do nothing and report "success"
              mc mb --ignore-existing rook/job-data
          env:
            - name: S3_ENDPOINT
              value: http://rook-ceph-rgw-rook-ceph.rook-ceph.svc:80
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: rook-ceph-object-user-rook-ceph-s3-job-data
                  key: AccessKey
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: rook-ceph-object-user-rook-ceph-s3-job-data
                  key: SecretKey
