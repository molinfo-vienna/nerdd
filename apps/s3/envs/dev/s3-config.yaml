apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: s3-config
spec:
  refreshInterval: "1h"
  secretStoreRef:
    kind: ClusterSecretStore
    name: s3-store
  target:
    name: s3-config
    template:
      type: Opaque
      data:
        s3_url: "http://rook-ceph-rgw-rook-ceph.rook-ceph.svc:80"
        s3_bucket_name: "job-data"
        s3_access_key_id: "{{ .ACCESS_KEY }}"
        s3_secret_access_key: "{{ .SECRET_KEY }}"
  data:
    # Read the credentials generated by the CephObjectStoreUser.
    - secretKey: ACCESS_KEY
      remoteRef:
        key: rook-ceph-object-user-rook-ceph-s3-job-data
        property: AccessKey
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: SECRET_KEY
      remoteRef:
        key: rook-ceph-object-user-rook-ceph-s3-job-data
        property: SecretKey
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
