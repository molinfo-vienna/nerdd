apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: Service
      name: nerdd-gateway-nginx
    path: patch-service.yaml
  - target:
      kind: Issuer
      name: nerdd-issuer
    path: patch-issuer.yaml
  - target:
      kind: Gateway
      name: nerdd-gateway
    path: patch-gateway.yaml
