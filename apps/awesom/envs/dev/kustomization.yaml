apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

components:
  - ../../../_common/nerdd-module/envs/dev

configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
      - image=ghcr.io/molinfo-vienna/awesom:latest

patches:
  - target:
      kind: Deployment
      name: awesom
    path: patch-deployment.yaml
