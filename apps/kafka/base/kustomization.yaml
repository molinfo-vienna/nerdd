apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # allow strimzi to operate on this namespace
  - rolebinding-strimzi-cluster-operator.yaml
  - rolebinding-strimzi-entity-operator.yaml
  # deploy kafka
  - kafka.yaml
  - kafka-config.yaml
  - broker-store.yaml
  - node-pool.yaml
  - topic-jobs.yaml
  - topic-results.yaml
  - topic-system.yaml
  - topic-result-checkpoints.yaml
  - topic-serialization-requests.yaml
  - topic-serialization-results.yaml
  - topic-logs.yaml
  - topic-modules.yaml
  # connect kafka metrics with prometheus
  - pod-monitor.yaml
  - kafka-metrics-config.yaml
