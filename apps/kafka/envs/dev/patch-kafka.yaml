- op: replace
  path: /spec/kafka/template
  value:
    pod:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: strimzi.io/cluster
                    operator: In
                    values:
                      - kafka-cluster
                  - key: strimzi.io/kind
                    operator: In
                    values:
                      - Kafka
              topologyKey: kubernetes.io/hostname
- op: replace
  path: /spec/kafka/config
  value:
    offsets.topic.replication.factor: 3
    transaction.state.log.replication.factor: 3
    transaction.state.log.min.isr: 2
    default.replication.factor: 3
    min.insync.replicas: 2
    initial.broker.registration.timeout.ms: 300000
    controller.quorum.election.timeout.ms: 10000
    controller.quorum.election.backoff.max.ms: 5000
    controller.quorum.fetch.timeout.ms: 10000
    auto.create.topics.enable: "false"
    producer.max.request.size: 10485760
    consumer.max.request.size: 10485760
    max.partition.fetch.bytes: 10485760
    message.max.bytes: 10485760
