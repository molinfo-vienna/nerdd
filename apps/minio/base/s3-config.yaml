apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: s3-config
spec:
  refreshInterval: "100000h"
  target:
    name: s3-config
    template:
      type: Opaque
      data:
        s3_url: <this-will-be-patched>
        s3_username: "taboo"
        s3_password: "{{ .password }}"
  dataFrom:
    - sourceRef:
        generatorRef:
          apiVersion: generators.external-secrets.io/v1alpha1
          kind: Password
          name: minio-password-generator
---
apiVersion: generators.external-secrets.io/v1alpha1
kind: Password
metadata:
  name: minio-password-generator
spec:
  length: 40
  allowRepeat: true
  noUpper: false
  symbols: 0
