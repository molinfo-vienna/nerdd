apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
  - deployment.yaml
  - topic.yaml
  - broker-config-es.yaml
  - scaler.yaml

replacements:
  - source:
      kind: ConfigMap
      name: app-config
      fieldPath: data.appName
    targets:
      - select:
          kind: Deployment
        fieldPaths:
          - metadata.name
          - spec.selector.matchLabels.app
          - spec.template.metadata.labels.app
          - spec.template.spec.containers.0.name
          - spec.template.spec.containers.0.env.[name=CHANNEL].valueFrom.secretKeyRef.name
          - spec.template.spec.containers.0.env.[name=BROKER_URL].valueFrom.secretKeyRef.name
          - spec.template.spec.containers.0.env.[name=BROKER_USERNAME].valueFrom.secretKeyRef.name
          - spec.template.spec.containers.0.env.[name=BROKER_PASSWORD].valueFrom.secretKeyRef.name
      - select:
          kind: ScaledObject
        fieldPaths:
          - metadata.name
          - metadata.labels.app
          - metadata.labels.deploymentName
          - spec.scaleTargetRef.name
      - select:
          kind: KafkaTopic
        fieldPaths:
          - metadata.labels.app
      - select:
          kind: ExternalSecret
          name: broker-config
        fieldPaths:
          - metadata.name
          - spec.target.name

  - source:
      kind: ConfigMap
      name: app-config
      fieldPath: data.image
    targets:
      - select:
          kind: Deployment
        fieldPaths:
          - spec.template.spec.containers.0.image

  - source:
      kind: ConfigMap
      name: app-config
      fieldPath: data.modelClass
    targets:
      - select:
          kind: Deployment
        fieldPaths:
          - spec.template.spec.containers.0.args.0

  - source:
      kind: ConfigMap
      name: app-config
      fieldPath: data.topic
    targets:
      - select:
          kind: ScaledObject
        fieldPaths:
          - spec.triggers.0.metadata.topic
      - select:
          kind: KafkaTopic
        fieldPaths:
          - metadata.name

  - source:
      kind: ConfigMap
      name: app-config
      fieldPath: data.consumerGroup
    targets:
      - select:
          kind: ScaledObject
        fieldPaths:
          - spec.triggers.0.metadata.consumerGroup

  - source:
      kind: ConfigMap
      name: app-config
      fieldPath: data.consumerGroup
    targets:
      - select:
          kind: ScaledObject
        fieldPaths:
          - spec.triggers.0.metadata.consumerGroup

  - source:
      kind: ConfigMap
      name: app-config
      fieldPath: data.minReplicaCount
    targets:
      - select:
          kind: ScaledObject
        fieldPaths:
          - spec.minReplicaCount

  - source:
      kind: ConfigMap
      name: app-config
      fieldPath: data.maxReplicaCount
    targets:
      - select:
          kind: ScaledObject
        fieldPaths:
          - spec.maxReplicaCount

  - source:
      kind: ConfigMap
      name: app-config
      fieldPath: data.cpuRequest
    targets:
      - select:
          kind: Deployment
        fieldPaths:
          - spec.template.spec.containers.0.resources.requests.cpu

  - source:
      kind: ConfigMap
      name: app-config
      fieldPath: data.memRequest
    targets:
      - select:
          kind: Deployment
        fieldPaths:
          - spec.template.spec.containers.0.resources.requests.memory

  - source:
      kind: ConfigMap
      name: app-config
      fieldPath: data.cpuLimit
    targets:
      - select:
          kind: Deployment
        fieldPaths:
          - spec.template.spec.containers.0.resources.limits.cpu

  - source:
      kind: ConfigMap
      name: app-config
      fieldPath: data.memLimit
    targets:
      - select:
          kind: Deployment
        fieldPaths:
          - spec.template.spec.containers.0.resources.limits.memory
