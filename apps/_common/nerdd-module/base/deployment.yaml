apiVersion: apps/v1
kind: Deployment
metadata:
  name: APP_NAME
  labels:
    app: APP_NAME
spec:
  selector:
    matchLabels:
      app: APP_NAME
  template:
    metadata:
      labels:
        app: APP_NAME
    spec:
      containers:
        - name: APP_NAME
          image: IMAGE
          command: ["/env/bin/nerdd_prediction_server"]
          args:
            - MODEL_CLASS
            - --channel=$(CHANNEL)
            - --broker-url=$(BROKER_URL)
            # TODO: add these args once we upgraded nerdd-link everywhere
            # - --broker-username=$(BROKER_USERNAME)
            # - --broker-password=$(BROKER_PASSWORD)
            - --data-dir=/data
          env:
            - name: CHANNEL
              valueFrom:
                secretKeyRef:
                  name: broker-config
                  key: channel
            - name: BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: broker-config
                  key: broker_url
            - name: BROKER_USERNAME
              valueFrom:
                secretKeyRef:
                  name: broker-config
                  key: broker_username
            - name: BROKER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: broker-config
                  key: broker_password
            - name: S3_URL
              valueFrom:
                secretKeyRef:
                  name: APP_NAME-s3-config
                  key: s3_url
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: APP_NAME-s3-config
                  key: s3_bucket
            - name: S3_USERNAME
              valueFrom:
                secretKeyRef:
                  name: APP_NAME-s3-config
                  key: s3_username
            - name: S3_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: APP_NAME-s3-config
                  key: s3_password
          volumeMounts:
            - name: data
              mountPath: "/data"
          resources:
            requests:
              cpu: CPU_REQUEST
              memory: MEM_REQUEST
            limits:
              cpu: CPU_LIMIT
              memory: MEM_LIMIT
      # important for long-running requests: we give 1h to terminate the current prediction task
      terminationGracePeriodSeconds: 3600
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: pvc-media
