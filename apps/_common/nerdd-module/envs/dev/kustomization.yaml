apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

components:
  - ../../base

configMapGenerator:
  - name: app-config
    behavior: merge
    literals:
      - minReplicaCount=1
      - maxReplicaCount=1

patches:
  - target:
      kind: KafkaTopic
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: dev-kafka
